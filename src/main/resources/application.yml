spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

  # Cấu hình H2 Database để lưu lịch sử
  datasource:
    url: jdbc:h2:file:./data/tiktokdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

# Cấu hình Email của Admin
app:
  admin-email: ninhquachhai0@gmail.com

groq:
  api:
    key: ${GROQ_API_KEY:YOUR_GROQ_API_KEY_HERE}
