<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tool Reup Pro – Advanced Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 280px;
            --primary-accent: #6366f1;
            --secondary-accent: #8b5cf6;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.9)), url('/images/bg-tool.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0;
        }

        .main-content { padding: 2rem; max-width: 1200px; margin: 0 auto; }

        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(16px); border: 1px solid var(--border-color); border-radius: 24px;
            padding: 2rem; transition: 0.3s; margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.2rem; font-weight: 700; color: var(--primary-accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1.5rem;
            display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;
        }

        .upload-area {
            border: 2px dashed rgba(99, 102, 241, 0.4); border-radius: 20px;
            padding: 3rem; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .upload-area:hover { border-color: var(--primary-accent); background: rgba(99, 102, 241, 0.05); }

        .btn-primary-glow {
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            border: none; padding: 1rem 2rem; border-radius: 12px; font-weight: 700; color: #fff;
            transition: 0.3s; box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }
        .btn-primary-glow:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(99, 102, 241, 0.5); }

        .job-item {
            background: rgba(255,255,255,0.03); border-radius: 16px; padding: 1.2rem; margin-bottom: 1rem;
            border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between;
        }
        .progress-bar { background-color: var(--primary-accent); }
        .progress { height: 8px; border-radius: 10px; background: rgba(255,255,255,0.1); margin-top: 10px; }
    </style>
</head>
<body>

<div class="main-content">
    <div class="glass-card">
        <h2 class="fw-bold mb-4 text-center"><i class="fas fa-magic me-2"></i> Advanced Video Reup & Bulk Processing</h2>
        <p class="text-center text-secondary mb-5">Hệ thống xử lý hàng loạt với các tính năng chuyên sâu cho Affiliate TikToker.</p>

        <div class="row">
            <div class="col-lg-6">
                <div class="section-title"><i class="fas fa-upload"></i> 1. Tải lên video hàng loạt</div>
                <div class="upload-area" onclick="document.getElementById('videosInput').click()">
                    <i class="fas fa-cloud-upload-alt fa-3x text-primary mb-3"></i>
                    <h4>Chọn video để xử lý</h4>
                    <p class="text-secondary">Có thể chọn nhiều file video cùng lúc</p>
                    <input type="file" id="videosInput" multiple class="d-none" accept="video/*">
                </div>
                <div id="fileList" class="mt-3"></div>
            </div>

            <div class="col-lg-6">
                <div class="section-title"><i class="fas fa-sliders-h"></i> 2. Cấu hình nâng cao</div>

                <div class="mb-3">
                    <label class="form-label">Chèn Khung Video (Frame)</label>
                    <select id="frameType" class="form-select bg-dark text-white border-secondary">
                        <option value="none">Không dùng khung</option>
                        <option value="news">Khung Tin Tức (News Style)</option>
                        <option value="review">Khung Review Sản Phẩm</option>
                        <option value="phone">Khung Điện Thoại (Phone Mockup)</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tiêu đề Hook (Đầu video)</label>
                    <input type="text" id="textHook" class="form-control bg-dark text-white border-secondary" placeholder="Ví dụ: Review thật lòng món này...">
                </div>

                <div class="mb-3">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="includeVoiceover">
                        <label class="form-check-label" for="includeVoiceover">Chuyển văn bản thành giọng nói (TTS)</label>
                    </div>
                </div>

                <button id="startProcessBtn" class="btn-primary-glow w-100 mt-4"><i class="fas fa-play me-2"></i> BẮT ĐẦU XỬ LÝ HÀNG LOẠT</button>
            </div>
        </div>
    </div>

    <div id="processingSection" class="glass-card" style="display: none;">
        <div class="section-title"><i class="fas fa-tasks"></i> Tiến trình xử lý (Queue)</div>
        <div id="jobQueue"></div>
    </div>
</div>

<script>
    const videosInput = document.getElementById('videosInput');
    const fileList = document.getElementById('fileList');
    const startProcessBtn = document.getElementById('startProcessBtn');
    const jobQueue = document.getElementById('jobQueue');
    const processingSection = document.getElementById('processingSection');

    let currentJobIds = [];

    videosInput.onchange = (e) => {
        fileList.innerHTML = '';
        if (e.target.files.length > 0) {
            for (let i = 0; i < e.target.files.length; i++) {
                const file = e.target.files[i];
                fileList.innerHTML += `<div class="job-item"><span><i class="fas fa-file-video me-2"></i> ${file.name}</span> <span class="badge bg-primary">Sẵn sàng</span></div>`;
            }
        }
    };

    startProcessBtn.onclick = async () => {
        if (videosInput.files.length === 0) {
            alert('Vui lòng chọn video!');
            return;
        }

        const formData = new FormData();
        for (let i = 0; i < videosInput.files.length; i++) {
            formData.append('videos', videosInput.files[i]);
        }
        formData.append('textHook', document.getElementById('textHook').value);
        formData.append('frameType', document.getElementById('frameType').value);
        formData.append('includeVoiceover', document.getElementById('includeVoiceover').checked);

        startProcessBtn.disabled = true;
        startProcessBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Đang upload...';

        try {
            const response = await fetch('/advanced-reup/bulk-upload', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if (data.success) {
                currentJobIds = data.jobIds;
                processingSection.style.display = 'block';
                startBulkProcessing();
            } else {
                alert('Lỗi: ' + data.error);
                startProcessBtn.disabled = false;
                startProcessBtn.innerHTML = '<i class="fas fa-play me-2"></i> BẮT ĐẦU XỬ LÝ HÀNG LOẠT';
            }
        } catch (error) {
            alert('Lỗi upload: ' + error.message);
            startProcessBtn.disabled = false;
        }
    };

    async function startBulkProcessing() {
        jobQueue.innerHTML = '';
        for (const jobId of currentJobIds) {
            jobQueue.innerHTML += `
                <div id="job-${jobId}" class="job-item flex-column align-items-stretch">
                    <div class="d-flex justify-content-between">
                        <span class="job-name">Đang tải thông tin...</span>
                        <span class="job-status badge bg-warning">Chờ xử lý</span>
                    </div>
                    <div class="progress">
                        <div id="progress-${jobId}" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
                    </div>
                    <div id="download-${jobId}" class="mt-2 text-end" style="display: none;">
                        <a href="/advanced-reup/download/${jobId}" class="btn btn-sm btn-success rounded-pill"><i class="fas fa-download"></i> Tải Video</a>
                    </div>
                </div>
            `;

            // Start processing this job
            const formData = new FormData();
            formData.append('textHook', document.getElementById('textHook').value);
            formData.append('frameType', document.getElementById('frameType').value);
            formData.append('includeVoiceover', document.getElementById('includeVoiceover').checked);

            fetch(`/advanced-reup/process/${jobId}`, {
                method: 'POST',
                body: formData
            });

            // Poll for status
            pollStatus(jobId);
        }
    }

    async function pollStatus(jobId) {
        const interval = setInterval(async () => {
            try {
                const response = await fetch(`/advanced-reup/status/${jobId}`);
                const data = await response.json();

                if (data.success) {
                    const jobEl = document.getElementById(`job-${jobId}`);
                    jobEl.querySelector('.job-name').innerText = data.fileName;

                    const bar = document.getElementById(`progress-${jobId}`);
                    bar.style.width = data.progress + '%';

                    if (data.status === 'COMPLETED') {
                        clearInterval(interval);
                        jobEl.querySelector('.job-status').innerText = 'Hoàn tất';
                        jobEl.querySelector('.job-status').className = 'job-status badge bg-success';
                        document.getElementById(`download-${jobId}`).style.display = 'block';
                        bar.classList.remove('progress-bar-animated', 'progress-bar-striped');
                    } else if (data.status === 'ERROR') {
                        clearInterval(interval);
                        jobEl.querySelector('.job-status').innerText = 'Lỗi';
                        jobEl.querySelector('.job-status').className = 'job-status badge bg-danger';
                    }
                }
            } catch (e) {
                console.error('Polling error', e);
            }
        }, 2000);
    }
</script>

</body>
</html>
