<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng nhập – TikTok Reup Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-accent: #6366f1;
            --secondary-accent: #8b5cf6;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.9)), url('/images/bg-tool.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .brand-icon {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .login-subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #fff;
            color: #1f2937;
            border: none;
            padding: 0.85rem;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            transition: 0.3s;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }

        .btn-google:hover {
            transform: translateY(-2px);
            background: #f3f4f6;
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.2);
        }

        .btn-google img {
            width: 20px;
            height: 20px;
        }

        .footer-links {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #64748b;
        }

        .footer-links a {
            color: var(--primary-accent);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-icon">
        <i class="fas fa-bolt"></i>
    </div>
    <h1 class="login-title">Chào mừng trở lại</h1>
    <p class="login-subtitle">Đăng nhập để bắt đầu tối ưu video Reup của bạn</p>

    <a href="/oauth2/authorization/google" class="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo">
        Tiếp tục với Google
    </a>

    <div class="footer-links">
        Bằng cách tiếp tục, bạn đồng ý với <br>
        <a href="#">Điều khoản sử dụng</a> & <a href="#">Chính sách bảo mật</a>
    </div>
</div>

</body>
</html>
