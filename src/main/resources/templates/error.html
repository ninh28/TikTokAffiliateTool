<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lỗi Hệ Thống - TikTok Reup Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .error-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 3rem; max-width: 500px; }
        .error-code { font-size: 5rem; font-weight: 800; background: linear-gradient(135deg, #f87171, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code" th:text="${status != null ? status : '500'}">500</div>
        <h3 class="mb-3">Oops! Đã có lỗi xảy ra</h3>
        <p class="text-secondary small mb-4" th:text="${message}">Có lỗi không mong muốn trong quá trình xử lý video hoặc xác thực người dùng.</p>
        <a href="/" class="btn btn-primary rounded-pill px-4">Quay lại Trang chủ</a>
    </div>
</body>
</html>
